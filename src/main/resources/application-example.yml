server:
  port: 8090

spring:
  datasource:
    url: jdbc:h2:file:./data/stock_db;MODE=MySQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
  thymeleaf:
    cache: false

claude:
  api-key: YOUR_CLAUDE_API_KEY
  model: claude-sonnet-4-6
  max-tokens: 1200
