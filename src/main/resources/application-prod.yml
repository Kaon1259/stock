server:
  port: ${PORT:8080}

spring:
  datasource:
    url: jdbc:mysql://${MYSQLHOST}:${MYSQLPORT:3306}/${MYSQLDATABASE}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul&useSSL=false&allowPublicKeyRetrieval=true
    username: ${MYSQLUSER}
    password: ${MYSQLPASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 5

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: Asia/Seoul

  thymeleaf:
    cache: true

  web:
    resources:
      cache:
        cachecontrol:
          max-age: 3600

claude:
  api-key: ${CLAUDE_API_KEY}
  model: ${CLAUDE_MODEL:claude-sonnet-4-6}
  max-tokens: ${CLAUDE_MAX_TOKENS:2200}
